<!DOCTYPE html>

<head>

        .service-name a:hover { color: #60a5fa; }

        .service-description { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.75rem; }
        .service-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .tag { font-size: 0.8rem; padding: 0.25rem 0.5rem; border-radius: 6px; background: #0f172a; color: #60a5fa; }
        .bookmark-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
        .bookmark-btn:hover, .bookmark-btn.active { color: #fbbf24; }
        .stats { text-align: center; color: #64748b; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #1e293b; }
        .no-results { text-align: center; color: #64748b; padding: 3rem; }
        .source-link { text-align: center; margin-top: 1rem; }
        .source-link a { color: #60a5fa; text-decoration: none; font-size: 0.9rem; }
        .source-link a:hover { text-decoration: underline; }
    </style>
</head>

ired, limited to 45 req/minute from the same IP address for the free plan.","tags":["ip-api"]},{"name":"IP.City","url":"https://ip.city","description":"100 Free IP geolocation requests per day","tags":["ip-city"]},{"name":"IP2Location.io","url":"https://www.ip2location.io/","description":"Freemium, fast, and reliable IP geolocation API. Get data like city, coordinates, ISP, ASN, AS data and more. The free plan includes 50k credits per month. IP2Location.io also offers 500 free WHOIS and hosted domain lookups per month. See domain regi","tags":["ip2location-io"]},{"name":"ip2geo.dev","url":"https://ip2geo.dev","description":"IP geolocation API to convert IP addresses into location data including city, country, timezone, ASN, and currency. The free plan includes 1,000 requests per month.","tags":["ip2geo-dev"]},{"name":"ipaddress.sh","url":"https://ipaddress.sh","description":"Simple service to get a public IP address in different [formats](https://about.ipaddress.sh/).","tags":["ipaddress-sh"]},{"name":"ipapi.is","url":"https://ipapi.is/","description":"A reliable IP Address API from Developers for Developers with the best Hosting Detection capabilities that exist. The free plan offers 1000 lookups without signup.","tags":["ipapi-is"]},{"name":"ipapi","url":"https://ipapi.co/","description":"IP Address Location API by Kloudend, Inc - A reliable geolocation API built on AWS, trusted by Fortune 500. The free tier offers 30k lookups/month (1k/day) without signup.","tags":["ipapi"]},{"name":"ipbase.com","url":"https://ipbase.com","description":"IP Geolocation API - Forever free plan that spans 150 monthly requests.","tags":["ipbase-com"]},{"name":"IPinfo","url":"https://ipinfo.io/","description":"Fast, accurate, and free (up to 50k/month) IP address data API. Offers APIs with details on geolocation, companies, carriers, IP ranges, domains, abuse contacts, and more. All paid APIs can be trialed for free.","tags":["ipinfo"]},{"name":"IPLocate","url":"https://www.iplocate.i let fuse = null;
let currentCategory = 'all';
let bookmarks = JSON.parse(localStorage.getItem('devtools-bookmarks') || '[]');

function initSearch() {
    fuse = new Fuse(services, {
        keys: ['name', 'category', 'description', 'tags'],
        threshold: 0.3,
        includeScore: true
    });
    renderServices(services);
}

function renderServices(results) {
    const container = document.getElementById('results');
    const countEl = document.getElementById('resultCount');
    
    if (!results.length) {
        container.innerHTML = '<p class="no-results">검색 결과가 없습니다.</p>';
        countEl.textContent = '0';
        return;
    }
    
    countEl.textContent = results.length;
    container.innerHTML = results.map((svc) => {
        const escName = svc.name.replace(/'/g, "\'");
        return `
        <div class="service-card">
            <div class="service-header">
                <div>
                    <span class="service-name">
                        <a href="${svc.url}" target="_blank" rel="noopener">${svc.name}</a>
                    </span>
                    <span class="service-category">${svc.category}</span>
                </div>
                <button class="bookmark-btn ${bookmarks.includes(svc.name) ? 'active' : ''}" 
                        onclick="toggleBookmark('${escName}')" title="북마크">★</button>
            </div>
            <p class="service-description">${svc.description}</p>
            <div class="service-tags">
                ${svc.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
            </div>
        </div>
        `;
    }).join('');
}

function toggleBookmark(name) {
    const idx = bookmarks.indexOf(name);
    if (idx > -1) {
        bookmarks.splice(idx, 1);
    } else {
        bookmarks.push(name);
    }
    localStorage.setItem('devtools-bookmarks', JSON.stringify(bookmarks));
    renderServices(getFilteredResults());
}

function getFilteredResults() {
    const query = document.getElementById('searchInput').value.trim();
    
    if (!query) {
        if (currentCategory === 'all') return services;
        return services.filter(s => s.category === currentCategory);
    }
    
    let results = fuse.search(query).map(r => r.item);
    if (currentCategory !== 'all') {
        results = results.filter(s => s.category === currentCategory);
    }
    return results;
}

document.getElementById('searchInput').addEventListener('input', () => {
    renderServices(getFilteredResults());
});

document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderServices(getFilteredResults());
    });
});

initSearch();
</script>
